name: changelog-update

on:
  schedule:
    - cron: "0 15 * * *" # 00:00 KST
  push:
    paths:
      - "website/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate changelog data
        run: |
          python3 core/scripts/changelog_data.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- website/lab/changelog/data.json; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/lab/changelog/data.json
          git commit -m "chore: update changelog data"
          git push
