<script>
  /* Archive 리스트 렌더링 + 타입 필터 */
  fetch('index.json')
    .then(function (r) { return r.json(); })
    .then(function (posts) {
      var list = document.getElementById('archive-list');
      if (!list || !posts.length) return;

      posts.forEach(function (p, i) {
        var num = String(i + 1).padStart(3, '0');
        var type = (p.type || 'essay').toLowerCase();
        var item = document.createElement('a');
        item.href = p.slug + '/';
        item.className = 'archive-list-item';
        item.setAttribute('data-reveal', '');
        item.setAttribute('data-type', type);
        item.innerHTML =
          '<span class="archive-list-item__issue">' + num + '</span>' +
          '<span class="archive-list-item__title">' + p.title + '</span>' +
          '<span class="archive-list-item__date">' + p.date + '</span>';
        list.appendChild(item);
      });

      var obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add('is-visible'); obs.unobserve(e.target); }
        });
      }, { threshold: 0.05 });
      document.querySelectorAll('[data-reveal]').forEach(function (el) { obs.observe(el); });

      var activeFilter = 'all';
      var searchQuery = '';

      function applyFilters() {
        var items = list.querySelectorAll('.archive-list-item');
        items.forEach(function (item) {
          var typeMatch = activeFilter === 'all' || item.getAttribute('data-type') === activeFilter;
          var textMatch = !searchQuery || item.querySelector('.archive-list-item__title').textContent.toLowerCase().indexOf(searchQuery) !== -1;
          item.style.display = (typeMatch && textMatch) ? '' : 'none';
        });
      }

      var filterBtns = document.querySelectorAll('#archive-type-filter .archive-filter__btn');
      filterBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          activeFilter = btn.getAttribute('data-filter');
          filterBtns.forEach(function (b) { b.classList.toggle('is-active', b === btn); });
          applyFilters();
        });
      });

      var searchEl = document.getElementById('archive-search');
      if (searchEl) {
        searchEl.addEventListener('input', function () {
          searchQuery = searchEl.value.trim().toLowerCase();
          applyFilters();
        });
      }
    })
    .catch(function () { console.warn('archive: index.json 없음'); });
</script>
