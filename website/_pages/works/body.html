<section class="practice-rail container--wide" id="works-rail">
  <article class="practice-block" id="atelier">
    <p class="practice-block__num">001</p>
    <h2 class="practice-block__title">Atelier</h2>
    <p class="practice-block__lead">얼굴 윤곽과 두상 형태를 먼저 읽고 디자인하는 오프라인 헤어 공간입니다.</p>
    <p class="practice-block__status" data-release-status="atelier">HOLD</p>
    <a class="practice-block__link release-action release-action--hold"
       href="/works/"
       data-release-link="atelier"
       data-release-live-href="/works/atelier/"
       data-release-live-label="Open Atelier"
       data-release-hold-label="Atelier Preparing"
       data-release-hold-href="/works/"
       aria-disabled="true">Atelier Preparing</a>
  </article>

  <article class="practice-block" id="offering">
    <p class="practice-block__num">002</p>
    <h2 class="practice-block__title">Offering</h2>
    <p class="practice-block__lead">브랜드의 시각 방향과 실행 톤을 정렬합니다. 기록과 도구를 하나의 오퍼링으로 정리합니다.</p>
    <p class="practice-block__status" data-release-status="direction">LIVE</p>
    <a class="practice-block__link"
       href="/works/offering/"
       data-release-link="direction"
       data-release-live-href="/works/offering/"
       data-release-live-label="Open Offering"
       data-release-hold-label="Offering Preparing"
       data-release-hold-href="/works/"
       aria-disabled="false">Open Offering</a>
  </article>

  <article class="practice-block practice-block--projects" id="projects">
    <div class="practice-block__head">
      <p class="practice-block__num">003</p>
      <h2 class="practice-block__title">Projects</h2>
    </div>
    <p class="practice-block__lead">프로젝트 항목은 데이터 파일로 확장합니다. 항목을 추가하면 자동으로 리스트가 갱신됩니다.</p>
    <p class="practice-block__status" data-release-status="project">LIVE</p>
    <div class="practice-project-list" id="practice-project-list" aria-live="polite">
      <p class="practice-project-list__empty">프로젝트를 불러오는 중입니다.</p>
    </div>
    <a class="practice-block__link" href="/works/project/">Open Project Overview</a>
  </article>
</section>
