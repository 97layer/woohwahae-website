{% extends "base.html" %}
{% block title %}어바웃 편집{% endblock %}

{% block content %}
<div class="admin-section">
  <p class="admin-label">LAYER 2 — DESIGN</p>
  <h1 class="admin-title">어바웃 페이지 편집</h1>
  <p class="admin-subtitle" style="font-size:0.8rem;color:#888;margin-top:0.25rem;">
    website/about/index.html — 저장 시 로컬 반영. 발행 시 git push → Cloudflare Pages.
  </p>
</div>

{% if error %}
<div class="admin-flash" style="border-left:3px solid #c00;">
  <p>{{ error }}</p>
</div>
{% endif %}

<form method="post" id="about-form">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <input type="hidden" name="publish" id="publish-flag" value="">

  <div class="admin-form-group" style="margin-bottom:0.5rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
      <label for="content" style="margin:0;">HTML 소스</label>
      <div style="display:flex;gap:0.5rem;">
        <button type="button" onclick="wrapSelection('<!-- ',' -->')" class="admin-btn" style="font-size:0.72rem;padding:0.2rem 0.6rem;">주석</button>
        <button type="button" onclick="formatCode()" class="admin-btn" style="font-size:0.72rem;padding:0.2rem 0.6rem;">포맷</button>
      </div>
    </div>
    <textarea
      id="content"
      name="content"
      rows="36"
      spellcheck="false"
      autocomplete="off"
      style="font-family:monospace;font-size:0.78rem;line-height:1.6;width:100%;box-sizing:border-box;resize:vertical;tab-size:2;"
    >{{ content }}</textarea>
  </div>

  <div style="display:flex;gap:0.75rem;align-items:center;padding:1rem 0;">
    <button type="submit" class="admin-action-btn">저장 (로컬)</button>
    <button type="button" class="admin-action-btn" style="background:#1a1a1a;" onclick="publishNow()">저장 + 발행</button>
    <a href="{{ url_for('dashboard') }}" class="admin-btn">취소</a>
    <span id="char-count" style="margin-left:auto;font-size:0.72rem;color:#999;font-family:monospace;"></span>
  </div>
</form>

<script>
const ta = document.getElementById('content');
const flag = document.getElementById('publish-flag');
const charCount = document.getElementById('char-count');

function updateCount() {
  const lines = ta.value.split('\n').length;
  const chars = ta.value.length;
  charCount.textContent = lines + ' lines · ' + chars.toLocaleString() + ' chars';
}
ta.addEventListener('input', updateCount);
updateCount();

// Tab key → 2 spaces
ta.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = this.selectionStart, end = this.selectionEnd;
    this.value = this.value.substring(0, s) + '  ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = s + 2;
  }
  // Cmd+S → save
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    document.getElementById('about-form').submit();
  }
});

function wrapSelection(before, after) {
  const s = ta.selectionStart, e = ta.selectionEnd;
  ta.value = ta.value.substring(0, s) + before + ta.value.substring(s, e) + after + ta.value.substring(e);
  ta.selectionStart = s + before.length;
  ta.selectionEnd = e + before.length;
  ta.focus();
}

function publishNow() {
  flag.value = '1';
  document.getElementById('about-form').submit();
}

// Warn on unsaved changes
let saved = false;
document.getElementById('about-form').addEventListener('submit', () => { saved = true; });
window.addEventListener('beforeunload', function(e) {
  if (!saved) { e.preventDefault(); e.returnValue = ''; }
});
</script>
{% endblock %}
